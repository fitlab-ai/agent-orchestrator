name: Sandbox Linux E2E

on:
  pull_request:
    paths:
      - "bin/cli.js"
      - "lib/sandbox/**"
      - "install.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sandbox-linux-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "bin/cli.js"
      - "lib/sandbox/**"
      - "install.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sandbox-linux-e2e.yml"
  workflow_dispatch:

jobs:
  sandbox-linux:
    name: Linux native Docker sandbox lifecycle (${{ matrix.mode }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.mode == 'rootless' }} # TODO(#256 follow-up): remove once rootless matrix has 3+ green runs.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mode: [rootful, rootless]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Link local CLI
        run: npm link

      - name: Setup rootless Docker
        if: matrix.mode == 'rootless'
        run: |
          set -euxo pipefail
          sudo apt-get update
          # uidmap / slirp4netns / dbus-user-session are the runtime dependencies
          # the rootless setup script checks for during install.
          sudo apt-get install -y uidmap slirp4netns dbus-user-session
          # Stop and disable the preinstalled rootful daemon and remove its
          # stale socket, otherwise the get.docker.com installer aborts with
          # "rootful Docker is running and accessible".
          sudo systemctl stop docker.service docker.socket || true
          sudo systemctl disable docker.service docker.socket || true
          sudo rm -f /var/run/docker.sock
          # systemd --user services die with the login session unless lingering
          # is enabled, which keeps the user manager alive for the runner user.
          sudo loginctl enable-linger "$USER"
          # The setuptool needs XDG_RUNTIME_DIR (and the dbus user socket inside
          # it) to be ready before invocation; the user manager may take a
          # moment to materialise the runtime dir after enable-linger.
          for _ in $(seq 1 30); do
            [ -d "/run/user/$(id -u)" ] && break
            sleep 1
          done
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
          # Install the rootless Docker tarball under ~/bin (includes
          # dockerd-rootless-setuptool.sh). docker-ce-rootless-extras is not in
          # the apt repos available on ubuntu-latest, so use the official curl
          # bootstrap as Docker's docs recommend for that case.
          # FORCE_ROOTLESS_INSTALL bypasses the safety check in case any rootful
          # docker residue (e.g. cached socket) is still detectable.
          curl -fsSL https://get.docker.com/rootless | FORCE_ROOTLESS_INSTALL=1 sh
          export PATH="$HOME/bin:$PATH"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          dockerd-rootless-setuptool.sh install
          DOCKER_HOST="unix://${XDG_RUNTIME_DIR}/docker.sock"
          echo "DOCKER_HOST=${DOCKER_HOST}" >> "$GITHUB_ENV"
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS}" >> "$GITHUB_ENV"
          export DOCKER_HOST
          docker info

      - name: Prepare host state
        run: |
          mkdir -p "$HOME/.claude"
          cat > "$HOME/.claude/.credentials.json" <<'JSON'
          {
            "accessToken": "stub-access-token",
            "refreshToken": "stub-refresh-token",
            "expiresAt": "2999-01-01T00:00:00.000Z",
            "scopes": ["user:profile", "user:sessions:claude_code"]
          }
          JSON

      - name: Prepare test repository
        run: |
          mkdir -p /tmp/test-repo/.agents
          cd /tmp/test-repo
          git init
          git config user.name "agent-infra CI"
          git config user.email "agent-infra-ci@example.com"
          git branch -M main
          cat > .agents/.airc.json <<'JSON'
          {
            "project": "linux-e2e",
            "org": "fitlab-ai",
            "sandbox": {
              "runtimes": ["node20"],
              "tools": ["claude-code"]
            }
          }
          JSON
          printf '# linux e2e\n' > README.md
          git add README.md .agents/.airc.json
          git commit -m "chore: prepare linux sandbox e2e fixture"

      - name: Run sandbox lifecycle
        working-directory: /tmp/test-repo
        run: |
          docker info
          ai sandbox create test-branch main
          ai sandbox ls
          container="$(docker ps --filter "label=linux-e2e.sandbox.branch=test-branch" --format '{{.Names}}' | head -n 1)"
          test -n "$container"
          docker exec "$container" sh -lc 'echo hello && node --version'

      - name: Cleanup sandbox artifacts
        if: always()
        run: |
          docker ps -aq --filter "label=linux-e2e.sandbox" | xargs -r docker rm -f
          docker images -q --filter "label=linux-e2e.sandbox" | xargs -r docker rmi -f
          git -C /tmp/test-repo worktree remove --force "$HOME/.agent-infra/worktrees/linux-e2e/test-branch" 2>/dev/null || true
          git -C /tmp/test-repo branch -D test-branch 2>/dev/null || true
          rm -rf "$HOME/.agent-infra/worktrees/linux-e2e" "$HOME/.agent-infra/sandboxes"
