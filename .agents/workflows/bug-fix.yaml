# 缺陷修复工作流
# 修复缺陷时使用此工作流。

name: bug-fix
description: 诊断和修复缺陷的工作流。

steps:
  - name: analysis
    description: 复现缺陷，识别根本原因，确定修复范围。
    recommended_agents:
      - claude
      - gemini
    tasks:
      - 理解缺陷报告和预期行为
      - 复现缺陷（如果可能）
      - 追踪代码路径以识别根本原因
      - 确定受影响的文件和组件
      - 将发现记录在任务文件中
    inputs:
      - 缺陷报告或 Issue 描述
      - 复现步骤
      - 项目代码库
    artifact_versioning:
      outputs:
        - name: analysis
          pattern: "analysis.md | analysis-r{N}.md"
          rule: "扫描现有分析产物；首轮创建 analysis.md，后续修订创建 analysis-r{N}.md（N = 当前最高轮次 + 1）"
    outputs:
      - 根因分析
      - 受影响文件列表
      - 更新后的任务文件（分析部分）

  - name: design
    description: 规划修复方案并考虑边界情况。
    recommended_agents:
      - claude
    tasks:
      - 确定修复缺陷的最佳方案
      - 识别修复的潜在副作用
      - 规划验证修复的测试用例
      - 在任务文件中记录修复方案
    inputs:
      - 上一步的根因分析
      - 项目架构
    artifact_versioning:
      inputs:
        - name: analysis
          pattern: "analysis.md | analysis-r{N}.md"
          rule: "读取最高轮次的分析产物作为设计输入"
      outputs:
        - name: plan
          pattern: "plan.md | plan-r{N}.md"
          rule: "扫描现有方案产物；首轮创建 plan.md，后续修订创建 plan-r{N}.md（N = 当前最高轮次 + 1）"
    outputs:
      - 任务文件中记录的修复方案
      - 待添加的测试用例列表

  - name: implementation
    description: 实现缺陷修复并添加回归测试。
    recommended_agents:
      - codex
      - cursor
    tasks:
      - 创建缺陷修复分支
      - 实现修复
      - 添加在没有修复时会失败的回归测试
      - 验证现有测试仍然通过
      - 确保代码遵循项目规范
    inputs:
      - 上一步的修复方案
      - 项目编码标准
    artifact_versioning:
      outputs:
        - name: implementation
          pattern: "implementation.md | implementation-r{N}.md"
          rule: "扫描现有实现产物；首轮创建 implementation.md，后续重实现创建 implementation-r{N}.md（N = 当前最高轮次 + 1）"
    outputs:
      - 包含实现的缺陷修复分支
      - 回归测试文件
      - 更新后的任务文件（实现备注）

  - name: review
    description: 验证修复是否正确和完整。
    recommended_agents:
      - claude
    tasks:
      - 验证修复是否解决了根本原因
      - 检查回归测试是否充分
      - 确保未引入新问题
      - 验证修复不会破坏现有功能
      - 创建审查报告
    inputs:
      - 缺陷修复分支
      - 根因分析
    artifact_versioning:
      inputs:
        - name: implementation
          pattern: "implementation.md | implementation-r{N}.md"
          rule: "读取最高轮次的实现产物作为审查输入"
      outputs:
        - name: review
          pattern: "review.md | review-r{N}.md"
          rule: "扫描现有审查产物；首轮创建 review.md，后续轮次创建 review-r{N}.md（N = 当前最高轮次 + 1）"
    outputs:
      - 审查报告
      - 问题列表（如有）

  - name: fix
    description: 处理审查中发现的问题。
    recommended_agents:
      - codex
      - cursor
    tasks:
      - 修复审查中识别的问题
      - 根据需要更新测试
      - 验证所有测试通过
    inputs:
      - 审查报告
      - 缺陷修复分支
    artifact_versioning:
      inputs:
        - name: review
          pattern: "review.md | review-r{N}.md"
          rule: "读取最高轮次的审查产物，并校验其与 task.md Activity Log 中最近一条 Code Review 记录一致"
      outputs:
        - name: refinement
          pattern: "refinement.md | refinement-r{N}.md"
          rule: "扫描现有修复产物；首轮创建 refinement.md，后续轮次创建 refinement-r{N}.md（N = 当前最高轮次 + 1）"
    outputs:
      - 包含修复的更新分支
      - 更新后的任务文件

  - name: commit
    description: 最终确认缺陷修复并创建拉取请求。
    recommended_agents:
      - claude
      - human
    tasks:
      - 确保所有测试通过
      - 编写引用缺陷/Issue 的提交信息
      - 创建包含缺陷修复描述的拉取请求
      - 将 PR 关联到缺陷报告 Issue
      - 将任务移至已完成
    inputs:
      - 最终缺陷修复分支
      - 任务文件
    outputs:
      - 拉取请求
      - 已完成的任务文件（位于 .agents/workspace/completed/）
